appId: so.notion.Calendar
productName: Notion Calendar
directories:
  buildResources: build
files:
  - "!.devcontainers/*"
  - "!.github/*"
  - "!src/*"
  - "!electron.vite.config.ts"
  - "!{CHANGELOG.md,README.md}"
  - "!{tsconfig.json,tsconfig.node.json}"
asarUnpack:
  - resources/**
extraResources:
  - from: build
    to: build
    filter:
      - icon.png
linux:
  icon: build/icon.png
  desktop:
    entry:
      StartupWMClass: notion-calendar
  target:
    - deb
    - rpm
    - flatpak
  maintainer: dusansimic.me
  category: Calendar
flatpak:
  runtimeVersion: 23.08
  baseVersion: 23.08
npmRebuild: false
